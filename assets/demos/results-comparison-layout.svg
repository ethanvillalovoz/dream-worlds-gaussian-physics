<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title description">
  <title id="title">Dream Worlds experiment comparison layout</title>
  <desc id="description">A labeled three-over-two panel layout for the five archived Gaussian Splatting physics experiments.</desc>

  <rect width="1920" height="1080" fill="#07090f"/>

  <text x="960" y="48" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" text-anchor="middle">
    Dream Worlds — Physics on Gaussian Splats
  </text>
  <text x="960" y="84" fill="#9da9ba" font-family="Arial, Helvetica, sans-serif" font-size="23" text-anchor="middle">
    Synchronized archived outputs · 200 simulation steps · Δt = 0.02
  </text>

  <g fill="#0c1018" stroke="#273244" stroke-width="2">
    <rect x="40" y="105" width="600" height="450" rx="22"/>
    <rect x="660" y="105" width="600" height="450" rx="22"/>
    <rect x="1280" y="105" width="600" height="450" rx="22"/>
    <rect x="345" y="580" width="600" height="450" rx="22"/>
    <rect x="975" y="580" width="600" height="450" rx="22"/>
  </g>

  <g fill="#000000">
    <rect x="140" y="118" width="400" height="400"/>
    <rect x="760" y="118" width="400" height="400"/>
    <rect x="1380" y="118" width="400" height="400"/>
    <rect x="445" y="593" width="400" height="400"/>
    <rect x="1075" y="593" width="400" height="400"/>
  </g>

  <g fill="#e6edf7" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="700" text-anchor="middle">
    <text x="340" y="542">UNIFORM GRAVITY</text>
    <text x="960" y="542">RANDOMIZED INVERSE MASS</text>
    <text x="1580" y="542">LOW WIND</text>
    <text x="645" y="1017">MEDIUM WIND</text>
    <text x="1275" y="1017">HIGH WIND</text>
  </g>

  <text x="960" y="1064" fill="#768397" font-family="Arial, Helvetica, sans-serif" font-size="18" text-anchor="middle">
    Original project renders · synchronized and labeled for comparison · no experiment frames regenerated
  </text>
</svg>
